apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: list-generator
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io  # Do NOT delete the generated applications
spec:
  syncPolicy:
    applicationsSync: create-update
  generators:
    - list:
        elements:
          - cluster: yaml
            url: https://kubernetes.default.svc
            manifestPath: kustomize/overlays/prod
            namespace: production
            author: Harsh
          - cluster: kustomize
            url: https://kubernetes.default.svc
            manifestPath: kustomize/base
            namespace: default
            author: Robot
  template:
    metadata:
      name: '{{cluster}}-application'
    spec:
      info:
        - name: 'author'
          value: "{{author}}"
      project: default
      destination:
        server: '{{url}}'
        namespace: '{{namespace}}'
      source:
        repoURL: https://github.com/HarshPanchal18/argocd-application
        path: '{{manifestPath}}'