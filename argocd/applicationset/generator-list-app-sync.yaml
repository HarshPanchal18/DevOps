apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: list-generator
  namespace: argocd
spec:
  syncPolicy:
    applicationsSync: create-only # can be sync, create-delete, create-update
    preserveResourcesOnDeletion: true
  # fields should be ignored when comparing Applications
  ignoreApplicationDifferences:
    - name: some-app
      jqPathExpressions:
      - .spec.source.helm.values
  generators:
    - list:
        elements:
          - cluster: base
            url: https://kubernetes.default.svc
            manifestPath: kustomize/base
            namespace: timoni
            author: Robot123
          - cluster: prod
            url: https://kubernetes.default.svc
            manifestPath: kustomize/overlays/prod
            namespace: production
            author: Robot12345
  template:
    metadata:
      name: '{{cluster}}-application'
    spec:
      info:
        - name: 'author'
          value: "{{author}}"
      project: default
      destination:
        server: '{{url}}'
        namespace: '{{namespace}}'
      source:
        repoURL: https://github.com/HarshPanchal18/argocd-application
        path: '{{manifestPath}}'